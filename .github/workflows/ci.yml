name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

  test-matrix:
    # macOS is included so the FIFO read sensor (macOS-only; #100) actually runs
    # in CI - the FIFO tests are skipif!=Darwin, so ubuntu alone never exercises
    # them. Linux covers inotify/atime; macOS covers the FIFO path.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

  # Aggregate gate with a stable name. Branch protection requires the check
  # "test"; the OS matrix above emits per-leg names ("test-matrix (ubuntu-latest)"
  # etc.), so this single job is what the ruleset keys on. It stays green only
  # when every matrix leg passes, and the name is invariant to matrix changes.
  test:
    needs: [test-matrix]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all matrix legs to pass
        run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "one or more test-matrix legs failed: ${{ needs.test-matrix.result }}"
            exit 1
          fi

  ui-build:
    # The UI was previously unbuilt in CI, so a dependency bump could break
    # `npm run build` (tsc + vite) with all checks still green (#148).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "26" # match the Dockerfile's node base
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Run UI tests
        run: npm run test
        working-directory: ui

  docker-build:
    # Build the monolith image so base-image bumps and Dockerfile breakage are
    # caught in CI rather than at deploy time (#148).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t thumper:ci .
